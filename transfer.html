<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARBR | Wallet Transfer</title>
<link rel="icon" href="logo-aa.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/arbr.css" />
</head>
<body class="lang-ar" data-page="transfer">
<div class="bg-layer"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div id="site-nav"></div>
<main class="page-main app-page">
  <section class="sec">
    <h2 class="sec-title">Wallet <span>Transfers</span></h2>
    <p class="sec-desc">Send ARBR by username or wallet address. KYC is required before transfers.</p>
    <div class="buy-grid">
      <form class="panel" id="transferForm">
        <h3>Send ARBR <span id="transferKycBadge"></span></h3>
        <div class="fgroup"><label>Username or Wallet Address</label><input id="recipientLookup" placeholder="username or ARBR-..." required /></div>
        <button class="btn-secondary" type="button" id="lookupRecipientBtn" style="width:100%;margin-bottom:16px">Preview Recipient</button>
        <div class="details-grid" id="recipientPreview"></div>
        <div class="fgroup"><label>Amount</label><input id="transferAmount" type="number" min="1" step="0.01" required /></div>
        <div class="fgroup"><label>Note</label><input id="transferNote" /></div>
        <button class="btn-primary" id="sendTransferBtn" type="submit" style="width:100%;padding:14px">Confirm Transfer</button>
      </form>
      <div class="panel">
        <h3>Transfer History</h3>
        <div id="transferHistory"><div class="empty-orders">Loading...</div></div>
      </div>
    </div>
  </section>
</main>
<footer></footer>
<div id="shared-modals"></div><div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/arbr.js"></script>
<script src="assets/js/arbr-features.js"></script>
</body>
</html>
