<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARBR | Login</title>
<meta name="description" content="Arab Rial ARBR account access." />
<meta name="theme-color" content="#060910" />
<link rel="icon" href="logo-aa.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/arbr.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  .arbr-auth-wrap {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;
    position: relative;
    z-index: 1;
  }
  
  .arbr-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: #0d1220;
    border: 1px solid #1a2540;
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.06);
    animation: cardIn 0.5s cubic-bezier(.22,1,.36,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .arbr-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    justify-content: center;
  }
  .arbr-logo img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .arbr-logo-text {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 2px;
  }
  .arbr-logo-sub {
    font-size: 10px;
    color: #4a5a7a;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Divider */
  .arbr-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #1a2540, transparent);
    margin: 0 -36px 28px;
  }

  /* Tab switcher */
  .arbr-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1a2540;
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 28px;
    gap: 2px;
  }
  .arbr-tab {
    padding: 9px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #4a5a7a;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
    text-align: center;
  }
  .arbr-tab.active {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
    color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.2);
    font-weight: 600;
  }
  .arbr-tab:hover:not(.active) {
    color: #cdd6f0;
    background: rgba(255,255,255,0.04);
  }

  /* Method switcher */
  .arbr-method-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 22px;
  }
  .arbr-method-btn {
    flex: 1;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid #1a2540;
    background: transparent;
    color: #4a5a7a;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .arbr-method-btn.active {
    border-color: rgba(201,168,76,0.35);
    color: #c9a84c;
    background: rgba(201,168,76,0.06);
  }
  .arbr-method-btn:hover:not(.active) {
    border-color: #2a3a5a;
    color: #cdd6f0;
  }

  /* Form fields */
  .arbr-field {
    margin-bottom: 14px;
    text-align: right;
  }
  body.lang-en .arbr-field {
    text-align: left;
  }
  .arbr-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #4a5a7a;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .arbr-input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1a2540;
    border-radius: 9px;
    color: #cdd6f0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .arbr-input:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }
  .arbr-input::placeholder { color: #4a5a7a; opacity: 0.7; }

  .arbr-input-group {
    display: flex;
    gap: 8px;
  }
  .arbr-input-group .arbr-input { flex: 1; }

  /* Password hint */
  .arbr-hint {
    font-size: 11px;
    color: #4a5a7a;
    margin-top: 5px;
    line-height: 1.4;
  }

  /* Forgot */
  .arbr-forgot {
    display: block;
    text-align: right;
    font-size: 12px;
    color: #4a5a7a;
    text-decoration: none;
    margin-top: -6px;
    margin-bottom: 18px;
    transition: color 0.2s;
  }
  body.lang-en .arbr-forgot {
    text-align: left;
  }
  .arbr-forgot:hover { color: #c9a84c; }

  /* Primary button */
  .arbr-btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #c9a84c, #a8893d);
    color: #060910;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    margin-bottom: 14px;
  }
  .arbr-btn-primary:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(201,168,76,0.35);
  }
  .arbr-btn-primary:active { transform: translateY(0); }

  /* Secondary button */
  .arbr-btn-secondary {
    padding: 11px 16px;
    border-radius: 9px;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.08);
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .arbr-btn-secondary:hover {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.5);
  }
  .arbr-btn-secondary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Separator */
  .arbr-sep {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2px 0 14px;
    font-size: 11px;
    color: #4a5a7a;
  }
  .arbr-sep::before, .arbr-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a2540;
  }

  /* Google button */
  .arbr-btn-google {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #1a2540;
    background: rgba(255,255,255,0.03);
    color: #cdd6f0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .arbr-btn-google:hover {
    background: rgba(255,255,255,0.06);
    border-color: #2a3a5a;
  }

  /* Footer */
  .arbr-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #1a2540;
    text-align: center;
    font-size: 11px;
    color: #4a5a7a;
    letter-spacing: 0.3px;
  }
  .arbr-footer strong {
    font-family: 'Cinzel', serif;
    color: rgba(201,168,76,0.5);
    font-size: 12px;
    letter-spacing: 2px;
  }

  /* Info box */
  .arbr-info {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 12px;
    color: rgba(201,168,76,0.8);
    margin-bottom: 16px;
    line-height: 1.5;
    text-align: right;
  }
  body.lang-en .arbr-info {
    text-align: left;
  }

  /* OTP boxes */
  .arbr-otp-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    direction: ltr !important;
  }
  .arbr-otp-input {
    flex: 1;
    padding: 14px 6px;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1a2540;
    border-radius: 9px;
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .arbr-otp-input:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  /* Fade animation */
  .fade-in {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden {
    display: none !important;
  }
  
  /* Password strength meter override */
  .password-meter {
    height: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid #1a2540;
    overflow: hidden;
    margin: 8px 0;
  }
  .password-meter span {
    display: block;
    width: 0;
    height: 100%;
    background: linear-gradient(135deg, #c9a84c, #22C55E);
    transition: width 0.25s ease;
  }
  
  /* Quick links styling to match card */
  .quick-links {
    margin-top: 24px;
    justify-content: center;
  }
</style>
</head>
<body class="lang-ar" data-page="login">
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div id="site-nav"></div>

<main class="page-main">
  <div class="arbr-auth-wrap">
    <div class="arbr-card">
      <!-- Logo -->
      <div class="arbr-logo">
        <img src="logo-aa.png" alt="ARBR" onerror="this.style.display='none'" />
        <div>
          <div class="arbr-logo-text">ARBR</div>
          <div class="arbr-logo-sub" data-i18n="accountPortal">Account Portal</div>
        </div>
      </div>

      <div class="arbr-divider"></div>

      <!-- Tab switcher -->
      <div class="arbr-tabs">
        <button class="arbr-tab active" id="loginTab" type="button" data-i18n="login">Login</button>

      <!-- ─── LOGIN FORM CONTAINER ─── -->
      <div id="loginFormContainer" class="fade-in">

        <div class="arbr-method-tabs">
          <button class="arbr-method-btn active" id="loginMethodEmail" type="button" data-i18n="emailPasswordTab">

          </button>
          <button class="arbr-method-btn" id="loginMethodPhone" type="button" data-i18n="phoneOtpTab">
            📱 Phone OTP
          </button>
        </div>

        <!-- Email/Password Sub-Form -->
        <div id="emailLoginForm" class="fade-in">
          <div class="arbr-field">
            <label class="arbr-label" data-i18n="email">Email</label>
            <input class="arbr-input" id="loginEmail" type="email" placeholder="name@example.com" data-i18n-placeholder="emailPlaceholder" />
          </div>
          <div class="arbr-field">
            <label class="arbr-label" data-i18n="password">Password</label>
            <input class="arbr-input" id="loginPass" type="password" placeholder="••••••••" data-i18n-placeholder="passwordPlaceholder" />
          </div>
          <a href="forgot-password.html" class="arbr-forgot" data-i18n="forgotPassword">Forgot password?</a>

              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>

            </div>
            <button class="arbr-btn-primary" id="verifyPhoneOtpBtn" type="button" data-i18n="verifyLogin">Verify & Login</button>

        </div>
        <div class="arbr-field">

          <input class="arbr-input" id="sUsername" type="text" placeholder="username" data-i18n-placeholder="usernamePlaceholder" dir="ltr" />
        </div>
        <div class="arbr-field">
          <label class="arbr-label" data-i18n="phone">Phone Number</label>
          <input class="arbr-input" id="sPhone" type="tel" placeholder="+..." data-i18n-placeholder="phonePlaceholder" />
        </div>
        <div class="arbr-field">
          <label class="arbr-label" data-i18n="email">Email</label>
          <input class="arbr-input" id="sEmail" type="email" placeholder="name@example.com" data-i18n-placeholder="emailPlaceholder" />
        </div>
        <div class="arbr-field">
          <label class="arbr-label" data-i18n="password">Password</label>
          <input class="arbr-input" id="sPass" type="password" placeholder="••••••••" data-i18n-placeholder="passwordPlaceholder" />

        <strong>ARBR</strong><br />
        THE DIGITAL ASSET<br />
        <span style="font-size: 10px; margin-top: 4px; display: block;">© 2026 ARBR Network</span>
      </div>
    </div>

  <div class="quick-links">

<script>
  // UI State Manager
  (function () {
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginFormContainer = document.getElementById('loginFormContainer');
    const signupFormContainer = document.getElementById('signupFormContainer');

    const loginMethodEmail = document.getElementById('loginMethodEmail');
    const loginMethodPhone = document.getElementById('loginMethodPhone');
    const emailLoginForm = document.getElementById('emailLoginForm');
    const phoneLoginForm = document.getElementById('phoneLoginForm');

    const phoneOtpEntry = document.getElementById('phoneOtpEntry');
    const phoneOtpCodeVerification = document.getElementById('phoneOtpCodeVerification');
    const resendOtpBtn = document.getElementById('resendOtpBtn');
    const otpTimerText = document.getElementById('otpTimerText');
    const phoneOtpCode = document.getElementById('phoneOtpCode');
    const otpInputs = document.querySelectorAll('.arbr-otp-input');

    let countdownInterval = null;

    // Tab switcher (Login / Register)
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      signupTab.classList.remove('active');
      loginFormContainer.classList.remove('hidden');
      signupFormContainer.classList.add('hidden');
    });

    signupTab.addEventListener('click', () => {
      signupTab.classList.add('active');
      loginTab.classList.remove('active');
      signupFormContainer.classList.remove('hidden');
      loginFormContainer.classList.add('hidden');
    });

    // Method switcher (Email / Phone)
    loginMethodEmail.addEventListener('click', () => {
      loginMethodEmail.classList.add('active');
      loginMethodPhone.classList.remove('active');
      emailLoginForm.classList.remove('hidden');
      phoneLoginForm.classList.add('hidden');
    });

    loginMethodPhone.addEventListener('click', () => {
      loginMethodPhone.classList.add('active');
      loginMethodEmail.classList.remove('active');
      phoneLoginForm.classList.remove('hidden');
      emailLoginForm.classList.add('hidden');
    });

    // Timer countdown function
    function startCountdown() {
      let countdown = 60;
      otpTimerText.textContent = `Resend in ${countdown}s`;
      resendOtpBtn.disabled = true;

      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          clearInterval(countdownInterval);
          otpTimerText.textContent = '';
          resendOtpBtn.disabled = false;
        } else {
          otpTimerText.textContent = `Resend in ${countdown}s`;
        }
      }, 1000);
    }

    // React to backend OTP success event
    document.addEventListener('phone-otp-sent', () => {
      phoneOtpEntry.classList.add('hidden');
      phoneOtpCodeVerification.classList.remove('hidden');
      startCountdown();
      otpInputs[0].focus();
    });

    // Resend trigger
    resendOtpBtn.addEventListener('click', () => {
      document.getElementById('sendPhoneOtpBtn').click();
    });

    // OTP field navigation (focus next, backspace)
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value;
        if (!/^\d?$/.test(val)) {
          e.target.value = '';
          return;
        }
        if (val && index < 5) {
          otpInputs[index + 1].focus();
        }
        updateCodeValue();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
          if (!input.value && index > 0) {
            otpInputs[index - 1].value = '';
            otpInputs[index - 1].focus();
          } else {
            input.value = '';
          }
          updateCodeValue();
          e.preventDefault();
        }
      });

      // Handle paste
      input.addEventListener('paste', (e) => {
        const pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
        if (/^\d{6}$/.test(pasteData)) {
          otpInputs.forEach((inp, idx) => {
            inp.value = pasteData[idx];
          });
          phoneOtpCode.value = pasteData;
          otpInputs[5].focus();
          e.preventDefault();
        }
      });
    });

    function updateCodeValue() {
      let code = '';
      otpInputs.forEach(inp => {
        code += inp.value;
      });
      phoneOtpCode.value = code;
    }
  })();
</script>
</body>
</html>
