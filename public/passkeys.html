<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARBR | Passkeys</title>
<link rel="icon" href="logo-aa.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/arbr.css" />
</head>
<body class="lang-ar" data-page="passkeys">
<div class="bg-layer"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div id="site-nav"></div>
<main class="page-main app-page">
  <section class="sec">
    <h2 class="sec-title">Account <span>Passkeys</span></h2>
    <p class="sec-desc">Register a WebAuthn passkey for passwordless login while keeping password login as fallback.</p>
    <div class="dashboard-shell">
      <div class="dash-card">
        <h3>Register Passkey</h3>
        <div class="fgroup"><label>Device name</label><input id="passkeyDeviceName" placeholder="My phone or laptop" /></div>
        <button class="btn-primary" id="registerPasskeyBtn" type="button" style="width:100%;padding:14px">Register Passkey</button>
        <p class="helper-text" style="margin-top:12px">Requires deployed WebAuthn verification Edge Function before production use.</p>
      </div>
      <div class="dash-card">
        <h3>Registered Passkeys</h3>
        <div id="passkeysList"><div class="empty-orders">Loading...</div></div>
      </div>
    </div>
  </section>
</main>
<footer></footer>
<div id="shared-modals"></div><div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/arbr.js"></script>
<script src="assets/js/arbr-features.js"></script>
</body>
</html>
