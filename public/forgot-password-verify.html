<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARBR | Verify Reset Code</title>
<link rel="icon" href="logo-aa.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/arbr.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  .arbr-auth-wrap {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;
    position: relative;
    z-index: 1;
  }
  
  .arbr-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: #0d1220;
    border: 1px solid #1a2540;
    border-radius: 16px;
    padding: 40px 36px;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.06);
    animation: cardIn 0.5s cubic-bezier(.22,1,.36,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .arbr-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    justify-content: center;
  }
  .arbr-logo img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }
  .arbr-logo-text {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 2px;
  }
  .arbr-logo-sub {
    font-size: 10px;
    color: #4a5a7a;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Divider */
  .arbr-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #1a2540, transparent);
    margin: 0 -36px 28px;
  }

  /* Form fields */
  .arbr-field {
    margin-bottom: 20px;
    text-align: right;
  }
  body.lang-en .arbr-field {
    text-align: left;
  }
  .arbr-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #4a5a7a;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .arbr-input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1a2540;
    border-radius: 9px;
    color: #cdd6f0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .arbr-input:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }
  .arbr-input::placeholder { color: #4a5a7a; opacity: 0.7; }

  /* OTP boxes */
  .arbr-otp-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    direction: ltr !important;
  }
  .arbr-otp-input {
    width: 44px;
    height: 48px;
    padding: 10px 0;
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    background: rgba(255,255,255,0.03);
    border: 1px solid #1a2540;
    border-radius: 9px;
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .arbr-otp-input:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
  }

  /* Primary button */
  .arbr-btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #c9a84c, #a8893d);
    color: #060910;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.25);
    margin-bottom: 14px;
  }
  .arbr-btn-primary:hover {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(201,168,76,0.35);
  }
  .arbr-btn-primary:active { transform: translateY(0); }

  /* Secondary button */
  .arbr-btn-secondary {
    display: inline-block;
    width: 100%;
    text-align: center;
    padding: 11px 16px;
    border-radius: 9px;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.08);
    color: #c9a84c;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .arbr-btn-secondary:hover {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.5);
  }

  /* Info box */
  .arbr-info {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 9px;
    padding: 12px 14px;
    font-size: 12.5px;
    color: rgba(201,168,76,0.8);
    margin-bottom: 18px;
    line-height: 1.6;
    text-align: right;
  }
  body.lang-en .arbr-info {
    text-align: left;
  }

  /* Footer */
  .arbr-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #1a2540;
    text-align: center;
    font-size: 11px;
    color: #4a5a7a;
    letter-spacing: 0.3px;
  }
  .arbr-footer strong {
    font-family: 'Cinzel', serif;
    color: rgba(201,168,76,0.5);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .quick-links {
    margin-top: 24px;
    justify-content: center;
  }

  .user-display {
    color: #c9a84c;
    font-weight: bold;
    word-break: break-all;
    direction: ltr;
    display: inline-block;
  }
</style>
</head>
<body class="lang-ar" data-page="forgot-password-verify">
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div id="site-nav"></div>

<main class="page-main">
  <div class="arbr-auth-wrap">
    <div class="arbr-card">
      <!-- Logo -->
      <div class="arbr-logo">
        <img src="logo-aa.png" alt="ARBR" onerror="this.style.display='none'" />
        <div>
          <div class="arbr-logo-text">ARBR</div>
          <div class="arbr-logo-sub">Password Reset</div>
        </div>
      </div>

      <div class="arbr-divider"></div>

      <form id="passwordConfirmForm" class="fade-in" onsubmit="event.preventDefault();">
        <div class="arbr-info" style="text-align: center;">
          <span id="verifyMessage">افحص البريد الالكتروني بتاعك</span>
          <br/>
          <span class="user-display" id="identifierDisplay">-</span>
        </div>

        <div class="arbr-field">
          <label class="arbr-label" style="text-align: center; display: block; margin-bottom: 10px;">رمز التحقق</label>
          
          <input type="hidden" id="resetCode" />
          <div class="arbr-otp-row">
            <input id="otp-0" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
            <input id="otp-1" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
            <input id="otp-2" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
            <input id="otp-3" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
            <input id="otp-4" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
            <input id="otp-5" class="arbr-otp-input" type="text" inputmode="numeric" maxlength="1" />
          </div>
        </div>

        <div class="arbr-field">
          <label class="arbr-label">كلمة المرور الجديدة</label>
          <input class="arbr-input" id="newPassword" type="password" placeholder="••••••••" />
        </div>

        <button class="arbr-btn-primary" id="confirmResetBtn" type="button">تغيير كلمة المرور</button>
        
        <a href="forgot-password.html" class="arbr-btn-secondary">إرسال رمز جديد</a>
      </form>

      <!-- Footer -->
      <div class="arbr-footer">
        <strong>ARBR</strong><br />
        THE DIGITAL ASSET<br />
        <span style="font-size: 10px; margin-top: 4px; display: block;">© 2026 ARBR Network</span>
      </div>
    </div>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="buy.html">Buy</a>
    <a class="quick-link" href="deposit.html">Deposit</a>
    <a class="quick-link" href="dashboard.html">Dashboard</a>
  </div>
</main>

<footer></footer>
<div id="shared-modals"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/arbr.js"></script>
<script src="assets/js/arbr-features.js"></script>
</body>
</html>
