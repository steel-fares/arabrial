<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARBR | Forgot Password</title>
<link rel="icon" href="logo-aa.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/arbr.css" />
</head>
<body class="lang-ar" data-page="forgot-password">
<div class="bg-layer"></div><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div>
<div id="site-nav"></div>
<main class="page-main">
  <div class="auth-page-wrap">
    <form class="auth-panel" id="passwordResetForm">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
        <div class="logo-mark" style="width:40px;height:40px"><img src="logo-aa.png" alt="Arab Rial ARBR logo" /></div>
        <div class="logo-text"><b>ARBR</b><small class="auth-portal">Password Recovery</small></div>
      </div>
      <div class="fgroup">
        <label>Email or phone number</label>
        <input id="resetIdentifier" placeholder="name@example.com or +968..." />
      </div>
      <button class="btn-primary" id="requestResetBtn" type="submit" style="width:100%;padding:13px">Send verification code</button>
      <div class="auth-divider"><span>Reset with code</span></div>
      <div class="fgroup"><label>Verification code</label><input id="resetCode" placeholder="000000" /></div>
      <div class="fgroup"><label>New password</label><input id="newPassword" type="password" placeholder="••••••••" /></div>
      <button class="btn-secondary" id="confirmResetBtn" type="button" style="width:100%;padding:13px">Reset Password</button>
      <p class="helper-text" style="margin-top:14px">All password reset requests are logged. Email uses Supabase recovery links; phone reset requires the OTP Edge Function provider configuration.</p>
    </form>
  </div>
</main>
<footer></footer>
<div id="shared-modals"></div><div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/arbr.js"></script>
<script src="assets/js/arbr-features.js"></script>
</body>
</html>
